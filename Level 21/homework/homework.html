<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul>
        <li>რეცეფტი</li>
    </ul>
    <ol>
        <li>ფქვილი</li>
        <li>ცომი</li>
        <li>შაქარი</li>
        <li>კვერცხი</li>
    </ol>
    <!-- ol ტექსტებს ნომრავს ციფრებით -->
     <!-- ul ტექსტებს ნომრავს წერტილებით -->
      <!-- li aრის ტექსტი რომელსაც ვსვავთ ul-ში და ol-ში -->
    <!-- ol ტექსტებს ნომრავს წერტილებით ხოლო ul ნომრავს რიცხვებით და ციფრებით -->
     <b>aaaaa</b>
     <i>mnnnn</i>
</body>
</html>
