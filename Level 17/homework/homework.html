<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- i თეგი ხრის ტექსტს -->
    <!-- b თეგი ამუქებს ტექსტს -->
    <!-- u თეგი ხაზს უსვამს ტექსტს -->
    <!-- სემატიკური არის თეგი რომელის აჩვენებს თავის კონტენტს -->
     <p><em>andria</em></p>
     <p><strong>irakli</strong></p>
     <!-- i ტეგსა და em თეგს შორიას არის განსხვავება რომ i თეგი უფრო მუქია -->
    <!-- b თეგი და strong თეგი ერთი და იგივეა -->
     <i>andria</i>
     <u>irakli</u>
     <b>andria22222</b>
</body>
</html>
